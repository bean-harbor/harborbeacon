name: Contract PR Check

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --bin validate-contract-schemas
      - run: ./target/release/validate-contract-schemas --report validate-contract-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: schema-check-report
          path: validate-contract-report.json
