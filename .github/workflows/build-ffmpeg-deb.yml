name: Build harboros-ffmpeg deb

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version of the package (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download FFmpeg tarball
        run: |
          wget -q https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz

      - name: Extract tarball
        run: |
          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz

      - name: Prepare Debian package structure
        run: |
          mkdir -p harboros-ffmpeg/DEBIAN
          mkdir -p harboros-ffmpeg/usr/bin
          
          # Copy control file from repo
          cp debian-ffmpeg/control harboros-ffmpeg/DEBIAN/control
          
          # Replace version placeholder
          sed -i "s/VERSION_PLACEHOLDER/${{ inputs.version }}/g" harboros-ffmpeg/DEBIAN/control
          
          # Copy binaries
          cp ffmpeg-master-latest-linux64-gpl/bin/ffmpeg harboros-ffmpeg/usr/bin/
          cp ffmpeg-master-latest-linux64-gpl/bin/ffplay harboros-ffmpeg/usr/bin/
          cp ffmpeg-master-latest-linux64-gpl/bin/ffprobe harboros-ffmpeg/usr/bin/
          chmod +x harboros-ffmpeg/usr/bin/*

      - name: Build Debian package
        run: |
          PKG_NAME="harboros-ffmpeg_${{ inputs.version }}_linux_amd64"
          dpkg-deb --build harboros-ffmpeg "${PKG_NAME}.deb"
          
          mkdir -p artifacts
          mv "${PKG_NAME}.deb" artifacts/

      - name: Upload binary
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          R2_ENDPOINT="https://b001991453068c59d8f4aa512bc0b16a.r2.cloudflarestorage.com"
          R2_BUCKET="harboros-update"
          VERSION="${{ inputs.version }}"
          PKG_NAME="harboros-ffmpeg_${VERSION}_linux_amd64"

          aws s3api put-object --endpoint-url ${R2_ENDPOINT} --bucket ${R2_BUCKET} --key "deb/${PKG_NAME}.deb" --body "./artifacts/${PKG_NAME}.deb"
